<svg width="440" height="1078" viewBox="0 0 440 1078" fill="none" xmlns="http://www.w3.org/2000/svg" style="background: #000;">
  <defs>
    <style>
      /* Animação de desenho da linha para as partes roxas */
      .draw-main {
        stroke-dasharray: 8000;
        stroke-dashoffset: 8000;
        fill-opacity: 0;
        animation: drawLine 3s ease-in-out forwards, fadeInFill 2s ease-in-out 1.5s forwards;
      }

      .draw-secondary {
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        fill-opacity: 0;
        animation: drawLine 2s ease-in-out 1s forwards, fadeInFill 1.5s ease-in-out 2s forwards;
      }

      /* Animação de revelação para as partes brancas */
      .fade-white-1 {
        opacity: 0;
        animation: fadeIn 2s ease-out 2.5s forwards;
      }

      .fade-white-2 {
        opacity: 0;
        animation: fadeIn 2s ease-out 2.8s forwards;
      }

      /* Movimento contínuo de flutuação */
      .float {
        animation: floating 5s ease-in-out 3s infinite alternate;
        transform-origin: center;
      }

      /* Keyframes (Regras da animação) */
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }

      @keyframes fadeInFill {
        to { fill-opacity: 1; }
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @keyframes floating {
        0% { transform: translateY(0); }
        100% { transform: translateY(-20px); }
      }
    </style>
  </defs>

  <!-- Grupo que faz a logo inteira flutuar após ser desenhada -->
